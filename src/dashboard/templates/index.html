<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oma Ina</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e2e8f0;
    --muted: #8892a4;
    --accent: #3b82f6;
    --green: #22c55e;
    --orange: #f59e0b;
    --red: #ef4444;
    --nib: #22c55e;
    --cib: #3b82f6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    line-height: 1.5;
  }

  header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 { font-size: 18px; font-weight: 700; }
  header .subtitle { color: var(--muted); font-size: 12px; }

  /* Mode toggle (NIB / CIB) */
  .mode-toggle {
    display: flex;
    margin-left: auto;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 3px;
    gap: 2px;
  }
  .mode-btn {
    padding: 7px 20px;
    border-radius: 8px;
    border: none;
    background: none;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .mode-btn.active { background: var(--accent); color: #fff; }
  .mode-btn:not(.active):hover { color: var(--text); }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 20px;
    align-items: center;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-wrap: wrap;
  }
  .filter-group { display: flex; align-items: center; gap: 6px; }
  .filter-group-label {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .06em; color: var(--muted); white-space: nowrap;
  }
  .filter-chip {
    padding: 4px 12px; border-radius: 20px;
    border: 1px solid var(--border); background: none;
    color: var(--muted); font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all .12s; white-space: nowrap;
  }
  .filter-chip:hover { border-color: var(--accent); color: var(--text); }
  .filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .filter-chip.chip-star.active    { background: #854d0e; border-color: #d97706; color: #fde68a; }
  .filter-chip.chip-cow.active     { background: #14532d; border-color: #16a34a; color: #bbf7d0; }
  .filter-chip.chip-qmark.active   { background: #1e3a5f; border-color: #3b82f6; color: #bfdbfe; }
  .filter-chip.chip-dog.active     { background: #1e293b; border-color: #64748b; color: #cbd5e1; }
  .filter-chip.chip-retiring.active { background: #431407; border-color: #f59e0b; color: #fde68a; }

  .main { padding: 24px; max-width: 1400px; margin: 0 auto; }

  .summary-bar {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 20px;
    min-width: 140px;
  }
  .stat-card .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .05em; }
  .stat-card .value { font-size: 22px; font-weight: 700; margin-top: 2px; }
  .stat-card .breakdown { color: var(--muted); font-size: 10px; margin-top: 4px; line-height: 1.6; }

  .sets-grid, .sets-subgrid {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .set-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color .15s;
  }
  .set-card:hover { border-color: #3a3d4a; }

  .set-header {
    display: flex;
    gap: 16px;
    padding: 12px 16px;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }
  .set-card.expanded .set-header {
    border-bottom: 1px solid var(--border);
  }

  .set-img {
    width: 80px;
    height: 60px;
    object-fit: contain;
    border-radius: 6px;
    background: #111;
    flex-shrink: 0;
  }

  .set-meta { flex: 1; min-width: 0; }
  .set-name { font-size: 15px; font-weight: 700; }
  .set-sub { color: var(--muted); font-size: 12px; margin-top: 2px; }

  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  .badge-retired       { background: #7c3aed22; color: #a78bfa; border: 1px solid #7c3aed44; }
  .badge-active        { background: #22c55e22; color: #4ade80; border: 1px solid #22c55e44; }
  .badge-retiring-soon { background: #f59e0b22; color: #fbbf24; border: 1px solid #f59e0b66; }
  .set-card.retiring-soon-card { border-color: #f59e0b44; }
  .badge-nib     { background: #22c55e22; color: #4ade80; border: 1px solid #22c55e44; }
  .badge-cib     { background: #3b82f622; color: #60a5fa; border: 1px solid #3b82f644; }
  .badge-mp      { background: #f59e0b22; color: #fbbf24; border: 1px solid #f59e0b44; }

  .set-body { padding: 16px; display: none; }
  .set-card.expanded .set-body { display: block; }

  .set-expand-arrow {
    margin-left: auto;
    color: var(--muted);
    font-size: 13px;
    flex-shrink: 0;
    transition: transform .2s;
  }
  .set-card.expanded .set-expand-arrow { transform: rotate(180deg); }

  /* ── Compact stats (ingeklapte kaart) ─────────────────────────────────── */
  .compact-stats {
    flex-shrink: 0;
    margin-left: 12px;
    display: flex;
    gap: 20px;
    align-items: center;
  }

  /* Elk blok: Te koop / Verkopen — geen border, geen achtergrond */
  .cs-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    padding: 0 8px;
    min-width: 96px;
    text-align: center;
  }
  .cs-block-label {
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    white-space: nowrap;
  }

  /* NIB + CIB naast elkaar binnen een blok */
  .cs-split {
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }
  .cs-split-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .cs-val {
    font-size: 19px;
    font-weight: 700;
    line-height: 1;
    white-space: nowrap;
  }
  .cs-val .cs-delta {
    font-size: 9px;
    font-weight: 500;
    opacity: .7;
    vertical-align: super;
  }
  .cs-cond-label {
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .04em;
    opacity: .55;
  }
  .cs-nib { color: var(--nib); }
  .cs-cib { color: var(--cib); }

  /* Deal-blok — opvallend: groene border + glow */
  .cs-deal-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    background: #0a1a0f;
    border: 1.5px solid #22c55e77;
    border-radius: 10px;
    padding: 8px 20px;
    min-width: 72px;
    cursor: pointer;
    transition: border-color .15s, background .15s, box-shadow .15s;
    text-align: center;
    box-shadow: 0 0 12px #22c55e1a;
  }
  .cs-deal-block:hover {
    border-color: #22c55e;
    background: #0d2116;
    box-shadow: 0 0 20px #22c55e35;
  }
  .cs-deal-count {
    font-size: 28px;
    font-weight: 800;
    color: #4ade80;
    line-height: 1;
  }
  .cs-deal-icon {
    font-size: 10px;
    color: #4ade80;
    opacity: .7;
    letter-spacing: .05em;
    font-weight: 600;
    text-transform: uppercase;
  }

  .condition-panel { display: none; }
  .condition-panel.visible { display: block; }

  .platform-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 16px;
    font-size: 13px;
  }
  .platform-table th {
    color: var(--muted);
    font-weight: 500;
    text-align: left;
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  .platform-table td {
    padding: 10px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .platform-table tr:last-child td { border-bottom: none; }

  .price-fast   { color: var(--green); font-weight: 700; font-size: 15px; }
  .price-real   { color: var(--accent); font-weight: 600; }
  .price-none   { color: var(--muted); font-style: italic; }
  .count-badge  { background: var(--border); color: var(--muted); border-radius: 4px; padding: 1px 7px; font-size: 11px; }

  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 16px;
  }

  .chart-box {
    background: #13151f;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
  }
  .chart-box h4 { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }

  /* Active listings 2-column layout */
  .listings-section { margin-top: 16px; }
  .listings-cols {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .listings-col {}
  .col-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .04em;
    font-weight: 600;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .active-listing {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .active-listing:last-child { border-bottom: none; }
  .active-listing img { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; background: #111; flex-shrink: 0; }
  .active-listing .al-title { flex: 1; min-width: 0; }
  .active-listing .al-title a { color: var(--text); text-decoration: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
  .active-listing .al-title a:hover { color: var(--accent); }
  .active-listing .al-title .al-sub { color: var(--muted); font-size: 11px; }
  .active-listing .al-price { font-weight: 700; white-space: nowrap; color: var(--green); }
  .price-unknown { color: var(--muted); }
  .reserved-badge { display: inline-block; font-size: 10px; font-weight: 600; background: #7c3aed22; color: #a78bfa; border: 1px solid #7c3aed55; border-radius: 4px; padding: 1px 5px; margin-left: 4px; vertical-align: middle; white-space: nowrap; }

  .expand-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--accent);
    font-size: 11px;
    cursor: pointer;
    padding: 4px 10px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 6px;
  }
  .expand-btn:hover { background: var(--border); }

  .tooltip-hint { color: var(--muted); font-size: 11px; cursor: help; text-decoration: underline dotted; }

  .no-data { color: var(--muted); font-style: italic; font-size: 13px; padding: 12px 0; text-align: center; }
  .no-data-sm { color: var(--muted); font-size: 12px; padding: 6px 0; }

  .rejection-bar {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 20px;
    margin-bottom: 24px;
  }
  .rejection-bar h3 { font-size: 12px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 8px; }
  .rejection-items { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
  .rejection-item { font-size: 12px; }
  .rejection-item .rej-count { font-weight: 700; color: var(--orange); }
  .rej-toggle-btn {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    color: var(--accent); font-size: 11px; cursor: pointer; padding: 2px 8px;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .rej-toggle-btn:hover { background: var(--border); }
  .price-too-low-panel {
    margin-top: 16px; border-top: 1px solid var(--border); padding-top: 14px;
    display: none;
  }
  .price-too-low-panel.open { display: block; }
  .ptl-set-group { margin-bottom: 16px; }
  .ptl-set-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .05em; color: var(--muted); margin-bottom: 8px;
  }
  .ptl-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 10px;
  }
  .ptl-card {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; text-decoration: none; color: var(--text);
    display: flex; flex-direction: column;
    transition: border-color .15s;
  }
  .ptl-card:hover { border-color: var(--accent); }
  .ptl-card img {
    width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #111;
    display: block;
  }
  .ptl-card .ptl-img-placeholder {
    width: 100%; aspect-ratio: 1/1; background: #111;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 22px;
  }
  .ptl-card .ptl-info {
    padding: 6px 8px; font-size: 11px;
  }
  .ptl-card .ptl-price { font-weight: 700; color: var(--orange); font-size: 13px; }
  .ptl-card .ptl-title {
    color: var(--muted); margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .ptl-card .ptl-platform { font-size: 10px; color: var(--muted); margin-top: 2px; }

  footer {
    text-align: center;
    color: var(--muted);
    font-size: 11px;
    padding: 32px 24px;
    border-top: 1px solid var(--border);
    margin-top: 40px;
  }

  /* BCG category section headers */
  .bcg-section { margin-bottom: 28px; }
  .bcg-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    margin-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .bcg-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
  }
  .bcg-count {
    font-size: 11px;
    color: var(--muted);
    background: var(--border);
    padding: 1px 7px;
    border-radius: 10px;
  }
  .bcg-desc {
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
    font-style: italic;
  }
  .bcg-star    .bcg-title { color: #fbbf24; }
  .bcg-cow     .bcg-title { color: #4ade80; }
  .bcg-qmark   .bcg-title { color: #60a5fa; }
  .bcg-dog     .bcg-title { color: #94a3b8; }

  /* Hot score badge */
  .hot-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 12px; font-weight: 700; padding: 3px 9px;
    border-radius: 20px; white-space: nowrap; flex-shrink: 0;
  }
  .hot-0  { background: #1e2130; color: #64748b; border: 1px solid #334155; }
  .hot-1  { background: #1e2130; color: #94a3b8; border: 1px solid #334155; }
  .hot-2  { background: #1c2436; color: #60a5fa; border: 1px solid #2563eb44; }
  .hot-3  { background: #1e2a1a; color: #86efac; border: 1px solid #22c55e44; }
  .hot-4  { background: #2a1e13; color: #fbbf24; border: 1px solid #f59e0b44; }
  .hot-5  { background: #2a1212; color: #f87171; border: 1px solid #ef444444; }

  /* Deal badge */
  .deal-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 12px; font-weight: 700; padding: 3px 9px;
    border-radius: 20px; white-space: nowrap; flex-shrink: 0;
    background: #14261a; color: #4ade80; border: 1px solid #22c55e44;
    cursor: pointer;
  }
  .deal-badge:hover { border-color: #22c55e; }

  /* Retirement indicator */
  .retirement-indicator {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 600; padding: 2px 8px;
    border-radius: 4px; white-space: nowrap;
  }
  .ret-up   { background: #14261a; color: #4ade80; border: 1px solid #22c55e33; }
  .ret-down { background: #2a1212; color: #f87171; border: 1px solid #ef444433; }
  .ret-stable { background: #1e2130; color: #94a3b8; border: 1px solid #33415533; }

  /* CAGR badge */
  .cagr-badge {
    display: inline-flex; align-items: center;
    font-size: 11px; font-weight: 600; padding: 2px 7px;
    border-radius: 4px; white-space: nowrap;
  }
  .cagr-high   { background: #14261a; color: #4ade80; border: 1px solid #22c55e33; }
  .cagr-mid    { background: #2a1e0a; color: #fb923c; border: 1px solid #f9731633; }
  .cagr-low    { background: #1e2130; color: #94a3b8; border: 1px solid #33415533; }
  .cagr-neg    { background: #2a1212; color: #f87171; border: 1px solid #ef444433; }

  /* Deal cards in expanded view */
  .deals-section {
    background: #0d1f14; border: 1px solid #22c55e33;
    border-radius: 8px; padding: 12px 14px; margin-bottom: 16px;
  }
  .deals-section h4 {
    font-size: 11px; color: #4ade80; text-transform: uppercase;
    letter-spacing: .05em; margin-bottom: 10px;
  }
  .deal-cards { display: flex; flex-direction: column; gap: 6px; }
  .deal-card {
    display: flex; align-items: center; gap: 10px;
    background: #0a1a0f; border: 1px solid #22c55e22;
    border-radius: 6px; padding: 8px 10px; text-decoration: none;
    color: var(--text); transition: border-color .15s;
  }
  .deal-card:hover { border-color: #22c55e; }
  .deal-card img { width: 36px; height: 36px; object-fit: cover; border-radius: 4px; background: #111; flex-shrink: 0; }
  .deal-card .dc-info { flex: 1; min-width: 0; }
  .deal-card .dc-title { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .deal-card .dc-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .deal-card .dc-price { font-weight: 700; color: #4ade80; font-size: 14px; white-space: nowrap; }
  .deal-card .dc-discount {
    background: #14261a; color: #4ade80; border: 1px solid #22c55e44;
    font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px;
    white-space: nowrap; flex-shrink: 0;
  }

  @media (max-width: 720px) {
    .charts-row { grid-template-columns: 1fr; }
    .listings-cols { grid-template-columns: 1fr; }
    .compact-stats { display: none; }
  }
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:12px">
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- achtergrond -->
      <rect width="36" height="36" rx="9" fill="#1a1d27" stroke="#2a2d3a" stroke-width="1"/>
      <!-- grijs haar (bun + zijkanten) -->
      <ellipse cx="18" cy="10" rx="9" ry="7" fill="#9ca3af"/>
      <ellipse cx="9.5" cy="15" rx="3.5" ry="5" fill="#9ca3af"/>
      <ellipse cx="26.5" cy="15" rx="3.5" ry="5" fill="#9ca3af"/>
      <!-- highlight haar -->
      <ellipse cx="15" cy="7" rx="4" ry="2.5" fill="#d1d5db" opacity="0.35"/>
      <!-- gezicht (warm peach) -->
      <ellipse cx="18" cy="21" rx="8.5" ry="9.5" fill="#f0c080"/>
      <!-- wenkbrauwen (dun, grijs) -->
      <path d="M 12 15 Q 14.5 14 16 15" stroke="#9ca3af" stroke-width="0.9" fill="none" stroke-linecap="round"/>
      <path d="M 20 15 Q 21.5 14 24 15" stroke="#9ca3af" stroke-width="0.9" fill="none" stroke-linecap="round"/>
      <!-- gouden brilletje -->
      <circle cx="14" cy="19" r="3" stroke="#d4a017" stroke-width="1.3" fill="rgba(200,230,255,0.08)"/>
      <circle cx="22" cy="19" r="3" stroke="#d4a017" stroke-width="1.3" fill="rgba(200,230,255,0.08)"/>
      <path d="M 17 19 L 19 19" stroke="#d4a017" stroke-width="1.1"/>
      <path d="M 11 18.5 L 8.5 18" stroke="#d4a017" stroke-width="1" stroke-linecap="round"/>
      <path d="M 25 18.5 L 27.5 18" stroke="#d4a017" stroke-width="1" stroke-linecap="round"/>
      <!-- ogen -->
      <circle cx="14" cy="19.3" r="1.4" fill="#2d1a0e"/>
      <circle cx="22" cy="19.3" r="1.4" fill="#2d1a0e"/>
      <circle cx="14.5" cy="18.7" r="0.45" fill="white"/>
      <circle cx="22.5" cy="18.7" r="0.45" fill="white"/>
      <!-- vriendelijke omaatjes-glimlach -->
      <path d="M 14.5 25 Q 18 28 21.5 25" stroke="#c07040" stroke-width="1.3" fill="none" stroke-linecap="round"/>
      <!-- rimpeltje bij ooghoek -->
      <path d="M 10.8 20.5 Q 11.5 21.5 10.8 22.5" stroke="#d4956a" stroke-width="0.7" fill="none" stroke-linecap="round"/>
      <path d="M 25.2 20.5 Q 24.5 21.5 25.2 22.5" stroke="#d4956a" stroke-width="0.7" fill="none" stroke-linecap="round"/>
      <!-- dikke gouden ketting -->
      <path d="M 11 29.5 Q 18 34.5 25 29.5" stroke="#b07a10" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <path d="M 11 29.5 Q 18 34.5 25 29.5" stroke="#f0c030" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-dasharray="2 2.5"/>
      <circle cx="13.5" cy="31" r="1.4" fill="#f0c030"/>
      <circle cx="18" cy="33" r="1.4" fill="#f0c030"/>
      <circle cx="22.5" cy="31" r="1.4" fill="#f0c030"/>
    </svg>
    <div>
      <h1>Oma Ina</h1>
      <div class="subtitle" id="gen-time">Laden...</div>
    </div>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn active" id="mode-NIB" onclick="setMode('NIB')">💎 Nieuw (NIB)</button>
    <button class="mode-btn"        id="mode-CIB" onclick="setMode('CIB')">🔧 Gebruikt (CIB)</button>
  </div>
</header>

<div class="filter-bar">
  <div class="filter-group">
    <span class="filter-group-label">BCG</span>
    <button class="filter-chip active"          data-bcg="all"           onclick="setBcgFilter('all')">Alle</button>
    <button class="filter-chip chip-star"       data-bcg="star"          onclick="setBcgFilter('star')">⭐ Stars</button>
    <button class="filter-chip chip-cow"        data-bcg="cash_cow"      onclick="setBcgFilter('cash_cow')" id="chip-cow">💰 Cash Cows</button>
    <button class="filter-chip chip-qmark"      data-bcg="question_mark" onclick="setBcgFilter('question_mark')">❓ Question Marks</button>
    <button class="filter-chip chip-dog"        data-bcg="dog"           onclick="setBcgFilter('dog')">🐕 Dogs</button>
  </div>
  <div class="filter-group">
    <span class="filter-group-label">Status</span>
    <button class="filter-chip active"          data-status="all"            onclick="setStatusFilter('all')">Alle</button>
    <button class="filter-chip chip-retiring"   data-status="retiring_soon"  onclick="setStatusFilter('retiring_soon')">🔔 Retiring Soon</button>
    <button class="filter-chip"                 data-status="recent_retired" onclick="setStatusFilter('recent_retired')">🆕 Recent Retired</button>
    <button class="filter-chip"                 data-status="retired"        onclick="setStatusFilter('retired')">Retired</button>
    <button class="filter-chip"                 data-status="active"         onclick="setStatusFilter('active')">Actief</button>
  </div>
</div>

<div class="main">
  <div id="summary-bar" class="summary-bar"></div>
  <div id="rejection-bar" class="rejection-bar" style="display:none">
    <h3>Afgewezen listings (afgelopen 7 dagen)</h3>
    <div class="rejection-items" id="rejection-items"></div>
  </div>
  <div class="sets-grid" id="sets-grid"></div>
</div>

<footer id="footer">Gegenereerd op <span id="footer-time"></span></footer>

<script>
let dashData = null;
let currentMode = 'NIB';   // 'NIB' | 'CIB'
let bcgFilter = 'all';     // 'all' | 'star' | 'cash_cow' | 'question_mark' | 'dog'
let statusFilter = 'all';  // 'all' | 'retiring_soon' | 'recent_retired' | 'retired' | 'active'

const CURRENT_YEAR = new Date().getFullYear();

fetch('./data/dashboard_data.json')
  .then(r => r.json())
  .then(data => {
    dashData = data;
    renderAll(data);
  })
  .catch(() => {
    document.getElementById('sets-grid').innerHTML =
      '<div class="no-data">Fout bij laden data. Probeer later opnieuw.</div>';
  });

function getSetStatus(set) {
  if (set.retiring_soon) return 'retiring_soon';
  if (!set.is_retired) return 'active';
  if (set.retired_year && (CURRENT_YEAR - set.retired_year) <= 2) return 'recent_retired';
  return 'retired';
}

function getSetBcg(set) {
  return currentMode === 'NIB' ? set.bcg_nib : set.bcg_cib;
}

function setMode(mode) {
  currentMode = mode;
  ['NIB','CIB'].forEach(m => {
    document.getElementById('mode-' + m).classList.toggle('active', m === mode);
  });
  // Cash Cow chip only relevant in NIB mode
  document.getElementById('chip-cow').style.display = mode === 'CIB' ? 'none' : '';
  if (mode === 'CIB' && bcgFilter === 'cash_cow') setBcgFilter('all');
  // Sync active condition panels in expanded cards
  document.querySelectorAll('.condition-panel').forEach(panel => {
    panel.classList.toggle('visible', panel.dataset.cond === mode);
  });
  if (dashData) redraw();
}

function setBcgFilter(val) {
  bcgFilter = val;
  document.querySelectorAll('[data-bcg]').forEach(el => {
    el.classList.toggle('active', el.dataset.bcg === val);
  });
  if (dashData) redraw();
}

function setStatusFilter(val) {
  statusFilter = val;
  document.querySelectorAll('[data-status]').forEach(el => {
    el.classList.toggle('active', el.dataset.status === val);
  });
  if (dashData) redraw();
}

// Legacy alias — called from expanded price panel tabs if they exist
function setCondition(cond) { setMode(cond); }

const BCG_ORDER = ['star', 'cash_cow', 'question_mark', 'dog'];
const BCG_META = {
  star:          { icon: '⭐', label: 'Stars',          cls: 'bcg-star',  descNIB: 'Hoge CAGR + boven retail',       descCIB: 'Hoge velocity + goede spread' },
  cash_cow:      { icon: '💰', label: 'Cash Cows',      cls: 'bcg-cow',   descNIB: 'Boven retail, bewaren & wachten', descCIB: '' },
  question_mark: { icon: '❓', label: 'Question Marks', cls: 'bcg-qmark', descNIB: 'Onzeker — te vroeg of geen data', descCIB: 'Onzeker — te vroeg of geen data' },
  dog:           { icon: '🐕', label: 'Dogs',           cls: 'bcg-dog',   descNIB: 'Slecht rendement',                descCIB: 'Trage markt, dunne marge' },
};

function renderAll(data) {
  const gen = new Date(data.generated_at);
  document.getElementById('gen-time').textContent =
    'Bijgewerkt: ' + gen.toLocaleDateString('nl-NL', {day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'});
  document.getElementById('footer-time').textContent = gen.toLocaleString('nl-NL');
  renderSummary(data);
  renderRejections(data.rejection_summary_7d);
  data.sets.sort((a, b) => a.name.localeCompare(b.name, 'nl'));

  // Assign stable render indices once
  let globalIdx = 0;
  data.sets.forEach(set => { set._renderIdx = globalIdx++; });

  redraw();
}

function redraw() {
  const data = dashData;
  const grid = document.getElementById('sets-grid');
  grid.innerHTML = '';

  // Filter sets
  const filtered = data.sets.filter(set => {
    const bcg = getSetBcg(set);
    const status = getSetStatus(set);
    if (bcgFilter !== 'all' && bcg !== bcgFilter) return false;
    if (statusFilter !== 'all' && status !== statusFilter) return false;
    return true;
  });

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-data">Geen sets gevonden met deze filters.</div>';
    return;
  }

  const renderSet = (set, container) => {
    container.appendChild(buildSetCard(set, set._renderIdx));
  };

  if (bcgFilter !== 'all') {
    // Flat list when filtering on specific BCG
    filtered.forEach(set => renderSet(set, grid));
  } else {
    // Grouped by BCG category
    const grouped = {};
    BCG_ORDER.forEach(k => { grouped[k] = []; });
    filtered.forEach(set => {
      const cat = getSetBcg(set) || 'question_mark';
      (grouped[cat] = grouped[cat] || []).push(set);
    });

    BCG_ORDER.forEach(cat => {
      const sets = grouped[cat];
      if (!sets || sets.length === 0) return;
      // Hide Cash Cow section in CIB mode
      if (cat === 'cash_cow' && currentMode === 'CIB') return;
      const meta = BCG_META[cat];
      const desc = currentMode === 'NIB' ? meta.descNIB : meta.descCIB;

      const section = document.createElement('div');
      section.className = `bcg-section ${meta.cls}`;
      section.innerHTML = `<div class="bcg-header">
        <span style="font-size:18px">${meta.icon}</span>
        <span class="bcg-title">${meta.label}</span>
        <span class="bcg-count">${sets.length}</span>
        <span class="bcg-desc">${desc}</span>
      </div><div class="sets-subgrid" id="sets-grid-${cat}"></div>`;
      grid.appendChild(section);

      const subgrid = section.querySelector(`#sets-grid-${cat}`);
      sets.forEach(set => renderSet(set, subgrid));
    });
  }

  // Render charts + listings after DOM is built
  filtered.forEach(set => {
    renderHistoryChart(set, set._renderIdx);
    renderBucketChart(set, set._renderIdx);
    renderActiveListings(set, set._renderIdx);
  });

  document.querySelectorAll('.condition-panel').forEach(panel => {
    panel.classList.toggle('visible', panel.dataset.cond === currentMode);
  });
}

function renderSummary(data) {
  const bar = document.getElementById('summary-bar');
  const totalSets = data.sets.length;

  let nibVinted = 0, nibMp = 0;
  let cibVinted = 0, cibMp = 0;

  data.sets.forEach(s => {
    const vn = s.platforms['vinted_nl'] || {};
    const mp = s.platforms['marktplaats'] || {};
    const nibV = (vn.NIB || {}).active_count || 0;
    const nibM = (mp.NIB || {}).active_count || 0;
    const cibV = (vn.CIB || {}).active_count || 0;
    const cibM = (mp.CIB || {}).active_count || 0;
    nibVinted += nibV; nibMp += nibM;
    cibVinted += cibV; cibMp += cibM;
  });

  const nibTotal = nibVinted + nibMp;
  const cibTotal = cibVinted + cibMp;

  bar.innerHTML = `
    <div class="stat-card">
      <div class="label">Sets gevolgd</div>
      <div class="value">${totalSets}</div>
    </div>
    <div class="stat-card">
      <div class="label">Actief Nieuw</div>
      <div class="value" style="color:var(--nib)">${nibTotal}</div>
      <div class="breakdown">Vinted: ${nibVinted} · Marktplaats: ${nibMp}</div>
    </div>
    <div class="stat-card">
      <div class="label">Actief Gebruikt</div>
      <div class="value" style="color:var(--cib)">${cibTotal}</div>
      <div class="breakdown">Vinted: ${cibVinted} · Marktplaats: ${cibMp}</div>
    </div>
    <div class="stat-card">
      <div class="label">Verkocht Nieuw</div>
      <div class="value" style="color:var(--nib)">${data.total_sold_NIB ?? 0}</div>
      <div class="breakdown">alle platforms · alle tijd</div>
    </div>
    <div class="stat-card">
      <div class="label">Verkocht Gebruikt</div>
      <div class="value" style="color:var(--cib)">${data.total_sold_CIB ?? 0}</div>
      <div class="breakdown">alle platforms · alle tijd</div>
    </div>
  `;
}

function renderRejections(summary) {
  if (!summary || Object.keys(summary).length === 0) return;
  const total = Object.values(summary).reduce((a,b) => a+b, 0);
  const bar = document.getElementById('rejection-bar');
  bar.style.display = 'block';
  const labels = {
    low_confidence: 'Setnummer niet in titel',
    price_too_low: 'Prijs te laag (zie per set)',
    price_too_high: 'Prijs te hoog',
    incomplete: 'Incompleet (cat C)',
    invalid_price: 'Ongeldige prijs',
  };
  const items = document.getElementById('rejection-items');
  items.innerHTML = Object.entries(summary).map(([reason, count]) =>
    `<div class="rejection-item"><span class="rej-count">${count}×</span> ${labels[reason] || escHtml(reason)}</div>`
  ).join('') + `<div class="rejection-item" style="margin-left:auto;color:var(--muted)">Totaal: ${total}</div>`;
}

function buildSetCard(set, idx) {
  const card = document.createElement('div');
  card.className = 'set-card' + (set.retiring_soon ? ' retiring-soon-card' : '');

  let statusBadge;
  if (set.retiring_soon) {
    statusBadge = '<span class="badge badge-retiring-soon" title="LEGO heeft aangekondigd dat dit set binnenkort uit productie gaat — koopkans">🔔 Retiring Soon</span>';
  } else if (set.is_retired) {
    statusBadge = '<span class="badge badge-retired">Retired</span>';
  } else {
    statusBadge = '<span class="badge badge-active">Actief</span>';
  }
  const retired = statusBadge;

  const retail = set.retail_price ? `€${set.retail_price.toFixed(0)}` : '—';

  // Retirement value indicator + CAGR
  const ri = set.retirement_indicator;
  let retHtml = '';
  if (ri) {
    const ar = ri.annual_return_pct;
    let cagrHtml = '';
    if (ar != null) {
      const cagrCls = ar >= 20 ? 'cagr-high' : ar >= 8 ? 'cagr-mid' : ar >= 0 ? 'cagr-low' : 'cagr-neg';
      const cagrSign = ar >= 0 ? '+' : '';
      const baseYear = set.retired_year || set.release_year;
      const years = baseYear ? (new Date().getFullYear() - baseYear) : null;
      const baseLabel = set.retired_year ? `retired ${set.retired_year}` : `release ${set.release_year}`;
      const yrsLabel = years ? ` — ${years}jr sinds ${baseLabel}` : '';
      cagrHtml = ` <span class="cagr-badge ${cagrCls}" title="Jaarlijks rendement (CAGR)${yrsLabel}: ${cagrSign}${ar}%/jr">${cagrSign}${ar}%<span style="font-weight:400;opacity:.7;font-size:9px">/jr</span></span>`;
    }
    if (ri.direction === 'up')
      retHtml = `<span class="retirement-indicator ret-up" title="NIB mediaan ligt ${ri.pct}% boven laatste retailprijs → set stijgt in waarde">📈 +${ri.pct}% vs retail</span>${cagrHtml}`;
    else if (ri.direction === 'down')
      retHtml = `<span class="retirement-indicator ret-down" title="NIB mediaan ligt ${ri.pct}% onder laatste retailprijs → set daalt in waarde">📉 −${ri.pct}% vs retail</span>${cagrHtml}`;
    else
      retHtml = `<span class="retirement-indicator ret-stable" title="NIB mediaan stabiel rond retailprijs">≈ retail</span>${cagrHtml}`;
  }

  const bcgForCard = getSetBcg(set);
  const BCG_BADGE = { star:'⭐ Star', cash_cow:'💰 Cash Cow', question_mark:'❓ Mark', dog:'🐕 Dog' };
  const BCG_BADGE_STYLE = {
    star:          'background:#854d0e;color:#fde68a;border:1px solid #d9770655',
    cash_cow:      'background:#14532d;color:#bbf7d0;border:1px solid #16a34a55',
    question_mark: 'background:#1e3a5f;color:#bfdbfe;border:1px solid #3b82f655',
    dog:           'background:#1e293b;color:#94a3b8;border:1px solid #47556955',
  };
  const bcgBadge = bcgForCard
    ? `<span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;${BCG_BADGE_STYLE[bcgForCard]}">${BCG_BADGE[bcgForCard]}</span>`
    : '';

  card.innerHTML = `
    <div class="set-header" onclick="toggleSetCard(this)">
      <img class="set-img" src="${escHtml(set.image_url)}" alt="${escHtml(set.name)}"
           onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2280%22 height=%2260%22><rect width=%2280%22 height=%2260%22 fill=%22%23222%22/></svg>'">
      <div class="set-meta">
        <div class="set-name">${escHtml(set.name)}</div>
        <div class="set-sub">#${set.set_number} · ${set.theme} · ${set.piece_count || '?'} stenen · ${set.release_year || ''}</div>
        <div style="margin-top:4px;display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          ${retired}
          ${bcgBadge}
          <span style="color:var(--muted);font-size:12px">Retail: ${retail}</span>
          ${retHtml}
        </div>
      </div>
      <div class="compact-stats" id="set-stats-${idx}">
        ${buildCompactStats(set)}
      </div>
      <div class="set-expand-arrow">▼</div>
    </div>
    <div class="set-body">
      ${buildDealsSection(set, idx)}
      ${buildConditionPanel(set, 'NIB', idx)}
      ${buildConditionPanel(set, 'CIB', idx)}
      <div class="charts-row">
        <div class="chart-box">
          <h4>Prijsontwikkeling</h4>
          <div id="chart-hist-${idx}" style="height:180px"></div>
        </div>
        <div class="chart-box">
          <h4>Verdeling actieve vraagprijzen (€10 stappen)</h4>
          <div id="chart-bucket-${idx}" style="height:180px"></div>
        </div>
      </div>
      <div id="active-listings-${idx}" class="listings-section"></div>
      ${buildPriceTooLowSection(set, idx)}
    </div>
  `;
  return card;
}

function buildConditionPanel(set, cond, idx) {
  const condLower = cond.toLowerCase();
  const platforms = ['vinted_nl', 'marktplaats'];
  const labels = {'vinted_nl': 'Vinted NL', 'marktplaats': 'Marktplaats'};

  let rows = '';
  platforms.forEach(platform => {
    const pd = (set.platforms[platform] || {})[cond] || {};
    const real = pd.sell_price_realistic != null ? `<span class="price-real">€${pd.sell_price_realistic.toFixed(0)}</span>` : '<span class="price-none">—</span>';
    const count = pd.active_count || 0;
    const p50 = pd.p50 != null ? `€${pd.p50.toFixed(0)}` : '—';
    const dis7 = pd.disappeared_7d || 0;
    const vel = dis7 > 0 ? `<span style="color:var(--green);font-size:11px">↑${dis7}/7d</span>` : '';

    rows += `<tr>
      <td><strong>${labels[platform]}</strong></td>
      <td>${real}</td>
      <td>${p50}</td>
      <td><span class="count-badge">${count}</span> ${vel}</td>
    </tr>`;
  });

  const initialVisible = cond === 'NIB' ? ' visible' : '';
  return `
    <div class="condition-panel${initialVisible}" data-cond="${cond}" data-idx="${idx}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <span class="badge badge-${condLower}">${cond === 'NIB' ? 'Nieuw' : 'Gebruikt'}</span>
      </div>
      <table class="platform-table">
        <thead>
          <tr>
            <th>Platform</th>
            <th><span class="tooltip-hint" title="Mediaan van verdwenen listings ≤21 dagen actief. Beste proxy voor echte transactieprijs.">Reële verkoopprijs</span></th>
            <th>Mediaan vraagprijs</th>
            <th>Actief</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function renderActiveListings(set, idx) {
  const container = document.getElementById(`active-listings-${idx}`);
  if (!container) return;

  const cond = activeCondition;
  const mpExtra = {};
  (set.mp_listings || []).forEach(l => { if (l.url) mpExtra[l.url] = l; });

  const mpListings = getListingsForCondition(set, 'marktplaats', cond, mpExtra);
  const vtListings = getListingsForCondition(set, 'vinted_nl', cond, mpExtra);

  const mpUnknown = ((set.platforms['marktplaats'] || {}).unknown_listings || [])
    .map(l => ({...l, platform: 'marktplaats'}));
  const vtUnknown = ((set.platforms['vinted_nl'] || {}).unknown_listings || [])
    .map(l => ({...l, platform: 'vinted_nl'}));
  const allUnknown = [...mpUnknown, ...vtUnknown]
    .sort((a, b) => (a.price || 0) - (b.price || 0));

  const totalKnown = mpListings.length + vtListings.length;
  if (totalKnown === 0 && allUnknown.length === 0) {
    container.innerHTML = '';
    return;
  }

  let html = '';
  if (totalKnown > 0) {
    html += `<div class="listings-cols">
      ${buildListingsColumn('marktplaats', 'Marktplaats', mpListings, idx)}
      ${buildListingsColumn('vinted_nl', 'Vinted NL', vtListings, idx)}
    </div>`;
  }

  if (allUnknown.length > 0) {
    html += buildUnknownSection(allUnknown, idx);
  }

  container.innerHTML = html;
}

function getListingsForCondition(set, platform, cond, mpExtra) {
  const listings = ((set.platforms[platform] || {})[cond] || {}).listings || [];
  return listings
    .map(l => {
      const extra = (mpExtra || {})[l.url] || {};
      return {
        ...l,
        price_type: extra.price_type || null,
        days_listed: extra.days_listed != null ? extra.days_listed : null,
      };
    })
    .sort((a, b) => (a.price || 0) - (b.price || 0));
}

function buildListingsColumn(platform, label, listings, idx) {
  const colId = `${idx}-${platform}`;
  const preview = listings.slice(0, 2);
  const extra = listings.slice(2);
  const panelId = `col-extra-${colId}`;
  const btnId = `col-btn-${colId}`;

  if (listings.length === 0) {
    return `<div class="listings-col">
      <div class="col-label">${label}</div>
      <div class="no-data-sm">Geen aanbod</div>
    </div>`;
  }

  const renderItem = (l) => {
    const sub = [
      l.price_type || null,
      l.days_listed != null ? `${l.days_listed}d online` : null,
    ].filter(Boolean).join(' · ');
    const reservedBadge = l.is_reserved ? '<span class="reserved-badge">Gereserveerd</span>' : '';
    return `<div class="active-listing">
      <img src="${escHtml(l.image_url || '')}" alt="" onerror="this.style.display='none'">
      <div class="al-title">
        <a href="${escHtml(l.url)}" target="_blank" rel="noopener">${escHtml(l.title)}${reservedBadge}</a>
        ${sub ? `<div class="al-sub">${sub}</div>` : ''}
      </div>
      <div class="al-price">€${Number(l.price || 0).toFixed(0)}</div>
    </div>`;
  };

  const previewHtml = preview.map(renderItem).join('');
  const extraHtml = extra.length > 0 ? `
    <div id="${panelId}" style="display:none">
      ${extra.map(renderItem).join('')}
    </div>
    <button class="expand-btn" id="${btnId}" onclick="toggleExpand('${panelId}','${btnId}',${listings.length})">
      <span>▼</span> Bekijk alles (${listings.length})
    </button>` : '';

  return `<div class="listings-col">
    <div class="col-label">${label}</div>
    ${previewHtml}
    ${extraHtml}
  </div>`;
}

function buildUnknownSection(listings, idx) {
  const panelId = `unknown-panel-${idx}`;
  const btnId = `unknown-btn-${idx}`;
  const platformLabels = { marktplaats: 'Marktplaats', vinted_nl: 'Vinted NL' };

  const items = listings.map(l => `<div class="active-listing">
    <img src="${escHtml(l.image_url || '')}" alt="" onerror="this.style.display='none'">
    <div class="al-title">
      <a href="${escHtml(l.url)}" target="_blank" rel="noopener">${escHtml(l.title)}</a>
      <div class="al-sub">${platformLabels[l.platform] || l.platform}</div>
    </div>
    <div class="al-price price-unknown">€${Number(l.price || 0).toFixed(0)}</div>
  </div>`).join('');

  return `<div style="border-top:1px solid var(--border);margin-top:12px;padding-top:12px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <h4 style="margin:0;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em">
        Onbekende staat — ${listings.length}
      </h4>
      <button class="rej-toggle-btn" id="${btnId}" onclick="togglePtlPanel('${panelId}','${btnId}')">
        <span>▼</span> Bekijk
      </button>
    </div>
    <div id="${panelId}" style="display:none">${items}</div>
  </div>`;
}

function buildPriceTooLowSection(set, idx) {
  const items = set.price_too_low_7d || [];
  if (items.length === 0) return '';
  const platformLabels = { marktplaats: 'Marktplaats', vinted_nl: 'Vinted NL' };
  const cards = items.map(l => {
    const imgHtml = l.image_url
      ? `<img src="${escHtml(l.image_url)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';
    const placeholder = `<div class="ptl-img-placeholder" style="${l.image_url ? 'display:none' : ''}">🧱</div>`;
    return `<a class="ptl-card" href="${escHtml(l.url || '#')}" target="_blank" rel="noopener">
      ${imgHtml}${placeholder}
      <div class="ptl-info">
        <div class="ptl-price">€${l.price ? Number(l.price).toFixed(0) : '?'}</div>
        <div class="ptl-title">${escHtml(l.title || '—')}</div>
        <div class="ptl-platform">${platformLabels[l.platform] || l.platform}</div>
      </div>
    </a>`;
  }).join('');

  const panelId = `ptl-panel-${idx}`;
  const btnId = `ptl-btn-${idx}`;
  return `<div class="listings-section" style="border-top:1px solid var(--border);margin-top:12px;padding-top:12px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <h4 style="margin:0">Afgewezen: prijs te laag (7d) — ${items.length}</h4>
      <button class="rej-toggle-btn" id="${btnId}" onclick="togglePtlPanel('${panelId}','${btnId}')">
        <span>▼</span> Bekijk
      </button>
    </div>
    <div id="${panelId}" style="display:none">
      <div class="ptl-grid">${cards}</div>
    </div>
  </div>`;
}

function togglePtlPanel(panelId, btnId) {
  const panel = document.getElementById(panelId);
  const btn = document.getElementById(btnId);
  const isOpen = panel.style.display === 'none';
  panel.style.display = isOpen ? 'block' : 'none';
  btn.querySelector('span').textContent = isOpen ? '▲' : '▼';
}

function toggleExpand(panelId, btnId, total) {
  const panel = document.getElementById(panelId);
  const btn = document.getElementById(btnId);
  const isOpen = panel.style.display === 'none';
  panel.style.display = isOpen ? 'block' : 'none';
  btn.querySelector('span').textContent = isOpen ? '▲' : '▼';
  btn.childNodes[btn.childNodes.length - 1].textContent = isOpen
    ? ` Inklappen` : ` Bekijk alles (${total})`;
}

function toggleSetCard(header) {
  const card = header.closest('.set-card');
  card.classList.toggle('expanded');
  if (card.classList.contains('expanded')) {
    setTimeout(() => {
      card.querySelectorAll('.js-plotly-plot').forEach(el => {
        try { Plotly.Plots.resize(el); } catch(e) {}
      });
    }, 50);
  }
}

function hotScoreLabel(score) {
  if (score === 0)  return { tier: 0, label: '❄ Geen data' };
  if (score <= 20)  return { tier: 1, label: '❄ Koud' };
  if (score <= 50)  return { tier: 2, label: '◉ Normaal' };
  if (score <= 70)  return { tier: 3, label: '● Warm' };
  if (score <= 85)  return { tier: 4, label: '🔥 Heet' };
  return              { tier: 5, label: '🔥 Zeer heet' };
}

function buildDealsSection(set, idx) {
  const deals = set.deals || [];
  if (deals.length === 0) return '';

  const condLabels = { NIB: 'Nieuw', CIB: 'Gebruikt' };
  const cards = deals.map(d => {
    const imgHtml = d.image_url
      ? `<img src="${escHtml(d.image_url)}" alt="" loading="lazy" onerror="this.style.display='none'">`
      : '';
    const condBadge = `<span class="badge badge-${(d.condition||'').toLowerCase()}">${condLabels[d.condition] || d.condition}</span>`;
    const typeBadge = d.price_type === 'bidding'
      ? `<span style="font-size:10px;color:var(--orange)">bod</span>`
      : '';
    const traderBadge = d.is_trader
      ? `<span style="font-size:10px;color:var(--muted)" title="${d.seller_count} LEGO-listings">handelaar</span>`
      : '';
    const subParts = [condBadge, typeBadge, traderBadge, `<span style="font-size:10px;color:var(--muted)">mediaan €${d.p50}</span>`].filter(Boolean).join(' ');
    return `<a class="deal-card" href="${escHtml(d.url)}" target="_blank" rel="noopener">
      ${imgHtml}
      <div class="dc-info">
        <div class="dc-title">${escHtml(d.title)}</div>
        <div class="dc-sub">${subParts}</div>
      </div>
      <div class="dc-price">€${Number(d.price || 0).toFixed(0)}</div>
      <div class="dc-discount">−${d.discount_pct}%</div>
    </a>`;
  }).join('');

  return `<div class="deals-section" id="deals-${idx}">
    <h4>🛒 Koopkansen op Marktplaats (${deals.length})</h4>
    <div class="deal-cards">${cards}</div>
  </div>`;
}

function expandAndScrollToDeals(badgeEl) {
  const card = badgeEl.closest('.set-card');
  if (!card) return;
  if (!card.classList.contains('expanded')) {
    card.classList.add('expanded');
    setTimeout(() => {
      card.querySelectorAll('.js-plotly-plot').forEach(el => {
        try { Plotly.Plots.resize(el); } catch(e) {}
      });
      const dealsEl = card.querySelector('.deals-section');
      if (dealsEl) dealsEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 80);
  } else {
    const dealsEl = card.querySelector('.deals-section');
    if (dealsEl) dealsEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function buildCompactStats(set) {
  const plats = ['vinted_nl', 'marktplaats'];
  let nibAct = 0, nibApp = 0, nibSold = 0, nibDis = 0;
  let cibAct = 0, cibApp = 0, cibSold = 0, cibDis = 0;

  plats.forEach(p => {
    const pd = set.platforms[p] || {};
    nibAct  += (pd.NIB || {}).active_count      || 0;
    nibApp  += (pd.NIB || {}).appeared_7d        || 0;
    nibSold += (pd.NIB || {}).total_disappeared  || 0;
    nibDis  += (pd.NIB || {}).disappeared_7d     || 0;
    cibAct  += (pd.CIB || {}).active_count      || 0;
    cibApp  += (pd.CIB || {}).appeared_7d        || 0;
    cibSold += (pd.CIB || {}).total_disappeared  || 0;
    cibDis  += (pd.CIB || {}).disappeared_7d     || 0;
  });

  const delta = (n) => n > 0 ? `<span class="cs-delta">+${n}</span>` : '';

  const splitBlock = (label, nibVal, nibD, cibVal, cibD) => `
    <div class="cs-block">
      <div class="cs-block-label">${label}</div>
      <div class="cs-split">
        <div class="cs-split-item">
          <div class="cs-val cs-nib">${nibVal}${delta(nibD)}</div>
          <div class="cs-cond-label cs-nib">NIB</div>
        </div>
        <div class="cs-split-item">
          <div class="cs-val cs-cib">${cibVal}${delta(cibD)}</div>
          <div class="cs-cond-label cs-cib">CIB</div>
        </div>
      </div>
    </div>`;

  const dealCount = (set.deals || []).length;
  const dealBlock = dealCount > 0 ? `
    <div class="cs-deal-block"
         title="${dealCount} deal${dealCount > 1 ? 's' : ''} gevonden — klik om te bekijken"
         onclick="event.stopPropagation();expandAndScrollToDeals(this)">
      <div class="cs-deal-count">${dealCount}</div>
      <div class="cs-deal-icon">deals</div>
    </div>` : '';

  return splitBlock('Te koop', nibAct, nibApp, cibAct, cibApp)
       + splitBlock('Verkopen', nibSold, nibDis, cibSold, cibDis)
       + dealBlock;
}

function renderHistoryChart(set, idx) {
  const el = document.getElementById(`chart-hist-${idx}`);
  if (!el) return;

  const cond = activeCondition;
  const history = (set.price_history || []).filter(h => h.condition === cond);

  const platforms = ['vinted_nl', 'marktplaats'];
  const platformLabels = {'vinted_nl':'Vinted NL','marktplaats':'Marktplaats'};
  const colors = {'vinted_nl':'#3b82f6','marktplaats':'#f59e0b'};

  const traces = [];
  platforms.forEach(platform => {
    const pts = history.filter(h => h.platform === platform);
    if (pts.length === 0) return;

    const realPts = pts.filter(h => h.sell_price_realistic != null);
    if (realPts.length > 0) {
      traces.push({
        x: realPts.map(h => h.date),
        y: realPts.map(h => h.sell_price_realistic),
        mode: 'lines+markers',
        name: `${platformLabels[platform]}`,
        line: { color: colors[platform], width: 2 },
        marker: { size: 4 },
      });
    }
  });

  if (traces.length === 0) {
    el.innerHTML = '<div class="no-data">Nog geen historische data</div>';
    return;
  }

  Plotly.newPlot(el, traces, {
    paper_bgcolor: 'transparent',
    plot_bgcolor: 'transparent',
    font: { color: '#8892a4', size: 10 },
    xaxis: { gridcolor: '#2a2d3a', tickfont: { size: 9 }, showgrid: true },
    yaxis: { gridcolor: '#2a2d3a', tickprefix: '€', tickfont: { size: 9 }, showgrid: true },
    legend: { font: { size: 9 }, bgcolor: 'transparent' },
    margin: { l: 44, r: 8, t: 8, b: 28 },
    showlegend: true,
  }, { responsive: true, displayModeBar: false });
}

function renderBucketChart(set, idx) {
  const el = document.getElementById(`chart-bucket-${idx}`);
  if (!el) return;

  const cond = activeCondition;
  const platforms = ['vinted_nl', 'marktplaats'];
  const platformLabels = {'vinted_nl':'Vinted NL','marktplaats':'Marktplaats'};
  const colors = {'vinted_nl':'#3b82f6aa','marktplaats':'#f59e0baa'};

  const allKeys = new Set();
  platforms.forEach(platform => {
    const pd = (set.platforms[platform] || {})[cond] || {};
    Object.keys(pd.price_buckets || {}).forEach(k => allKeys.add(k));
  });

  const keys = [...allKeys].sort((a, b) => parseInt(a) - parseInt(b));

  if (keys.length === 0) {
    el.innerHTML = '<div class="no-data">Geen actieve listings</div>';
    return;
  }

  const traces = platforms
    .map(platform => {
      const pd = (set.platforms[platform] || {})[cond] || {};
      const buckets = pd.price_buckets || {};
      return {
        x: keys.map(k => '€' + k),
        y: keys.map(k => buckets[k] || 0),
        type: 'bar',
        name: platformLabels[platform],
        marker: { color: colors[platform] },
      };
    })
    .filter(t => t.y.some(v => v > 0));

  if (traces.length === 0) {
    el.innerHTML = '<div class="no-data">Geen actieve listings</div>';
    return;
  }

  Plotly.newPlot(el, traces, {
    paper_bgcolor: 'transparent',
    plot_bgcolor: 'transparent',
    font: { color: '#8892a4', size: 10 },
    xaxis: { gridcolor: '#2a2d3a', tickfont: { size: 8 }, showgrid: false },
    yaxis: { gridcolor: '#2a2d3a', tickfont: { size: 9 }, showgrid: true, dtick: 1 },
    legend: { font: { size: 9 }, bgcolor: 'transparent' },
    margin: { l: 30, r: 8, t: 8, b: 40 },
    barmode: 'group',
    bargap: 0.15,
    bargroupgap: 0.05,
    showlegend: true,
  }, { responsive: true, displayModeBar: false });
}

function escHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
