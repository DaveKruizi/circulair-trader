name: Dagelijkse Vinted Prijsanalyse

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # 05:30 UTC = 07:30 CEST (zomer) / 06:30 CET (winter) — ochtendrun
  schedule:
    - cron: '30 5 * * *'

  # Handmatig starten
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-vinted:
    runs-on: ubuntu-latest

    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Data cache herstellen
        uses: actions/cache@v4
        with:
          path: data/
          key: lego-data-v2-${{ github.run_id }}
          restore-keys: |
            lego-data-v2-

      - name: Python installeren
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Dependencies installeren
        run: pip install -r requirements.txt

      - name: Playwright browser installeren
        run: playwright install chromium --with-deps

      # ------------------------------------------------------------------
      # Stap 1: Probeer automatisch een verse cookie op te halen via login
      # ------------------------------------------------------------------
      - name: Cookie vernieuwen via Playwright login
        id: playwright_login
        continue-on-error: true
        env:
          VINTED_EMAIL: ${{ secrets.VINTED_EMAIL }}
          VINTED_PASSWORD: ${{ secrets.VINTED_PASSWORD }}
        run: |
          echo "--- Playwright cookie refresh ---"
          COOKIE=$(python src/auth/vinted_cookie_refresh.py 2>/tmp/playwright_log.txt)
          EXIT=$?
          cat /tmp/playwright_log.txt

          if [ $EXIT -eq 0 ] && [ -n "$COOKIE" ]; then
            echo "✓ Verse cookie verkregen via Playwright (${#COOKIE} tekens)"
            echo "VINTED_SESSION_COOKIE=$COOKIE" >> $GITHUB_ENV
          else
            echo "⚠ Playwright login mislukt (exit $EXIT)"
          fi

      # ------------------------------------------------------------------
      # Stap 2: Fallback op opgeslagen secret als Playwright mislukte
      # ------------------------------------------------------------------
      - name: Cookie beschikbaarheid controleren
        env:
          SECRET_COOKIE: ${{ secrets.VINTED_SESSION_COOKIE }}
        run: |
          if [ -n "$VINTED_SESSION_COOKIE" ]; then
            echo "✓ Verse cookie via Playwright beschikbaar (${#VINTED_SESSION_COOKIE} tekens)"

          elif [ -n "$SECRET_COOKIE" ]; then
            echo "⚠ Playwright mislukt — gebruik opgeslagen VINTED_SESSION_COOKIE als fallback"
            echo "::add-mask::${SECRET_COOKIE}"
            echo "VINTED_SESSION_COOKIE=$SECRET_COOKIE" >> $GITHUB_ENV

          else
            echo "❌ Geen cookie beschikbaar!"
            echo ""
            echo "Oplossingen (kies één):"
            echo "  Automatisch: voeg VINTED_EMAIL + VINTED_PASSWORD toe als GitHub secrets"
            echo "  Handmatig:   voeg VINTED_SESSION_COOKIE toe (vinted.nl → DevTools → Cookies)"
            exit 1
          fi

      # ------------------------------------------------------------------
      # Stap 3: Eigenlijke scrape
      # ------------------------------------------------------------------
      - name: Vinted scrapen
        id: scrape
        timeout-minutes: 20
        env:
          PYTHONPATH: "."
        run: python src/main_vinted.py 2>&1 | tee vinted_log.txt; exit ${PIPESTATUS[0]}

      - name: Log tonen
        if: always()
        run: |
          echo "=== Resultaat: ${{ steps.scrape.outcome }} ==="
          tail -30 vinted_log.txt 2>/dev/null || echo "(geen log)"
          echo "--- data/ ---"
          ls -lah data/ 2>/dev/null || echo "(geen data)"

      - name: Data cache opslaan
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/
          key: lego-data-v2-${{ github.run_id }}
