name: Dagelijkse Vinted Prijsanalyse

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # 02:00 UTC = 03:00 NL wintertijd — vóór de Marktplaats run om 04:00
  schedule:
    - cron: '0 2 * * *'

  # Handmatig starten
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-vinted:
    runs-on: ubuntu-latest

    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Data cache herstellen
        uses: actions/cache@v4
        with:
          path: data/
          key: lego-data-v2-${{ github.run_id }}
          restore-keys: |
            lego-data-v2-

      - name: Python installeren
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Dependencies installeren
        run: pip install -r requirements.txt

      - name: Controleer VINTED_SESSION_COOKIE
        env:
          VINTED_SESSION_COOKIE: ${{ secrets.VINTED_SESSION_COOKIE }}
        run: |
          if [ -z "$VINTED_SESSION_COOKIE" ]; then
            echo "❌ VINTED_SESSION_COOKIE secret is niet ingesteld!"
            echo ""
            echo "Hoe dit op te lossen:"
            echo "  1. Log in op vinted.nl in je browser"
            echo "  2. Open DevTools → Application → Cookies → www.vinted.nl"
            echo "  3. Kopieer de waarde van 'access_token_web'"
            echo "  4. Ga naar GitHub repo → Settings → Secrets → Actions"
            echo "  5. Voeg toe: VINTED_SESSION_COOKIE = <gekopieerde waarde>"
            exit 1
          else
            echo "✓ VINTED_SESSION_COOKIE is ingesteld (${#VINTED_SESSION_COOKIE} tekens)"
          fi

      - name: Vinted scrapen
        id: scrape
        timeout-minutes: 20
        env:
          PYTHONPATH: "."
          VINTED_SESSION_COOKIE: ${{ secrets.VINTED_SESSION_COOKIE }}
        run: python src/main_vinted.py 2>&1 | tee vinted_log.txt; exit ${PIPESTATUS[0]}

      - name: Log tonen
        if: always()
        run: |
          echo "=== Resultaat: ${{ steps.scrape.outcome }} ==="
          tail -30 vinted_log.txt 2>/dev/null || echo "(geen log)"
          echo "--- data/ ---"
          ls -lah data/ 2>/dev/null || echo "(geen data)"

      - name: Data cache opslaan
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/
          key: lego-data-v2-${{ github.run_id }}
