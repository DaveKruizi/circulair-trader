name: Dagelijks Dashboard

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # Elke dag om 07:00 Nederlandse tijd (06:00 UTC in winter, 05:00 UTC in zomer)
  schedule:
    - cron: '0 6 * * *'

  # Ook handmatig te starten via GitHub → Actions → "Run workflow"
  workflow_dispatch:

  # Direct draaien bij push naar master (zodat de eerste deploy meteen gebeurt)
  push:
    branches:
      - master

permissions:
  contents: write  # Nodig voor GitHub Pages deployment
  issues: write    # Nodig voor feedback verwerking

jobs:
  run-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Python installeren
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Dependencies installeren
        run: pip install -r requirements.txt

      - name: Dashboard genereren
        id: generate
        continue-on-error: true
        timeout-minutes: 10
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: "DaveKruizi/circulair-trader"
          MIN_SELL_PRICE: "15"
          MIN_NET_MARGIN: "8"
          VINTED_COMMISSION_PCT: "5"
          SHIPPING_COST: "5"
          MAX_BUY_PRICE: "50"
          OUTPUT_DIR: "output"
        run: python src/main.py 2>&1 | tee output_log.txt; exit ${PIPESTATUS[0]}

      - name: Toon output log en gegenereerde bestanden
        if: always()
        run: |
          echo "=== Generate step uitkomst: ${{ steps.generate.outcome }} ==="
          echo ""
          echo "=== Output directory inhoud ==="
          ls -lah output/ 2>/dev/null || echo "(output/ map bestaat niet)"
          echo ""
          echo "=== Laatste 30 regels log ==="
          tail -30 output_log.txt 2>/dev/null || echo "(geen log)"
          echo ""
          if [ -f output/index.html ]; then
            echo "=== index.html gegenereerd: $(wc -c < output/index.html) bytes ==="
          else
            echo "=== GEEN index.html gegenereerd ==="
          fi

      - name: Placeholder aanmaken als dashboard generatie mislukte
        if: steps.generate.outcome == 'failure'
        run: |
          mkdir -p output
          touch output/.nojekyll
          cat > output/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="nl">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <meta http-equiv="refresh" content="300">
            <title>Circulair Trader — Dashboard</title>
            <style>
              body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
              .card { background: #1e293b; border-radius: 16px; padding: 2.5rem 3rem; text-align: center; max-width: 480px; box-shadow: 0 4px 32px rgba(0,0,0,0.4); }
              h1 { font-size: 1.8rem; margin: 0 0 0.5rem; color: #38bdf8; }
              p { color: #94a3b8; line-height: 1.6; }
              .badge { display: inline-block; background: #0ea5e9; color: #fff; border-radius: 999px; padding: 0.3rem 1rem; font-size: 0.85rem; margin-top: 1.2rem; }
              .icon { font-size: 3rem; margin-bottom: 1rem; }
            </style>
          </head>
          <body>
            <div class="card">
              <div class="icon">⏳</div>
              <h1>Circulair Trader</h1>
              <p>Het dashboard wordt elke dag om <strong>07:00</strong> automatisch bijgewerkt met de nieuwste koopdealansen.</p>
              <p>De eerste run is nog bezig of wacht op de dagelijkse planning. Deze pagina ververst automatisch.</p>
              <span class="badge">Eerste run in voorbereiding</span>
            </div>
          </body>
          </html>
          EOF

      - name: Dashboard online zetten (GitHub Pages)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          keep_files: true    # Bewaar eerdere dashboards als archief
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Dashboard update ${{ github.run_id }}'
