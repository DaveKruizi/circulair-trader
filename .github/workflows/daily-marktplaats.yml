name: Dagelijkse Marktplaats Scrape

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # 04:00 NL wintertijd = 03:00 UTC
  schedule:
    - cron: '0 3 * * *'

  # Handmatig starten via GitHub Actions
  workflow_dispatch:

  # Bij push naar master voor eerste deploy
  push:
    branches:
      - master

permissions:
  contents: write  # Voor data branch commit + GitHub Pages

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Code ophalen
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Data ophalen van data branch (persistent storage)
        run: |
          git fetch origin data-storage 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/data-storage; then
            git checkout origin/data-storage -- data/ 2>/dev/null || echo "Geen bestaande data gevonden, start vers"
          else
            echo "Data branch bestaat nog niet, wordt aangemaakt na eerste run"
            mkdir -p data
          fi

      - name: Python installeren
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Dependencies installeren
        run: pip install -r requirements.txt

      - name: Playwright browsers installeren
        run: playwright install chromium --with-deps 2>/dev/null || true

      - name: Marktplaats scrapen + Dashboard genereren
        id: generate
        continue-on-error: true
        timeout-minutes: 20
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONPATH: "."
        run: python src/main_daily.py 2>&1 | tee output_log.txt; exit ${PIPESTATUS[0]}

      - name: Log tonen
        if: always()
        run: |
          echo "=== Resultaat: ${{ steps.generate.outcome }} ==="
          tail -30 output_log.txt 2>/dev/null || echo "(geen log)"
          ls -lah output/ 2>/dev/null || echo "(geen output)"
          ls -lah data/ 2>/dev/null || echo "(geen data)"

      - name: Placeholder aanmaken bij fout
        if: steps.generate.outcome == 'failure'
        run: |
          mkdir -p output
          touch output/.nojekyll
          cat > output/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="nl">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="300">
            <title>LEGO Deal Tracker</title>
            <style>
              body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
              .card { background: #1a1d27; border-radius: 16px; padding: 2.5rem 3rem; text-align: center; max-width: 480px; }
              h1 { color: #3b82f6; margin-bottom: 0.5rem; }
              p { color: #8892a4; line-height: 1.6; }
            </style>
          </head>
          <body>
            <div class="card">
              <div style="font-size:3rem;margin-bottom:1rem;">🧱</div>
              <h1>LEGO Deal Tracker</h1>
              <p>Dashboard wordt elke ochtend om <strong>04:00</strong> bijgewerkt. Kom later terug.</p>
              <p style="font-size:0.85rem;margin-top:1rem;">Pagina ververst automatisch.</p>
            </div>
          </body>
          </html>
          EOF

      - name: Data opslaan naar data branch
        if: always()
        run: |
          if [ -d "data" ] && [ "$(ls -A data/ 2>/dev/null)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            # Fetch or create data-storage branch
            git fetch origin data-storage 2>/dev/null || true

            if git show-ref --verify --quiet refs/remotes/origin/data-storage; then
              git checkout -b data-storage origin/data-storage 2>/dev/null || git checkout data-storage
            else
              git checkout --orphan data-storage
              git rm -rf . --quiet 2>/dev/null || true
            fi

            mkdir -p data
            cp -r /tmp/data_backup/* data/ 2>/dev/null || true
            git checkout master -- data/ 2>/dev/null || true

            git add data/ --force
            git diff --cached --quiet || git commit -m "Data update $(date -u '+%Y-%m-%d %H:%M')"
            git push origin data-storage
            git checkout master
          fi
        continue-on-error: true

      - name: Dashboard online zetten (GitHub Pages)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'LEGO Dashboard update ${{ github.run_id }}'
