name: Dagelijkse Marktplaats Scrape

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # 04:00 NL wintertijd = 03:00 UTC
  schedule:
    - cron: '0 3 * * *'

  # Handmatig starten via GitHub Actions
  workflow_dispatch:

  # Bij push naar master voor eerste deploy
  push:
    branches:
      - master

permissions:
  contents: write  # Nodig voor GitHub Pages deployment

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Data cache herstellen
        uses: actions/cache@v4
        with:
          path: data/
          key: lego-data-v2-${{ github.run_id }}
          restore-keys: |
            lego-data-v2-

      - name: Python installeren
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Dependencies installeren
        run: pip install -r requirements.txt

      - name: Marktplaats scrapen + Dashboard genereren
        id: generate
        continue-on-error: true
        timeout-minutes: 20
        env:
          PYTHONPATH: "."
        run: python src/main_daily.py 2>&1 | tee output_log.txt; exit ${PIPESTATUS[0]}

      - name: Log tonen
        if: always()
        run: |
          echo "=== Resultaat: ${{ steps.generate.outcome }} ==="
          tail -30 output_log.txt 2>/dev/null || echo "(geen log)"
          echo "--- output/ ---"
          ls -lah output/ 2>/dev/null || echo "(geen output)"
          echo "--- data/ ---"
          ls -lah data/ 2>/dev/null || echo "(geen data)"

      - name: Placeholder aanmaken bij fout
        if: steps.generate.outcome == 'failure'
        run: |
          mkdir -p output
          touch output/.nojekyll
          printf '%s\n' '<!DOCTYPE html><html lang="nl"><head><meta charset="UTF-8"><meta http-equiv="refresh" content="300"><title>LEGO Deal Tracker</title><style>body{background:#0f1117;color:#e2e8f0;font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}.card{background:#1a1d27;border-radius:16px;padding:2.5rem 3rem;text-align:center;max-width:480px}h1{color:#3b82f6}p{color:#8892a4;line-height:1.6}</style></head><body><div class="card"><div style="font-size:3rem;margin-bottom:1rem;">🧱</div><h1>LEGO Deal Tracker</h1><p>Dashboard wordt elke ochtend om <strong>04:00</strong> bijgewerkt. Kom later terug.</p><p style="font-size:.85rem;margin-top:1rem">Pagina ververst automatisch over 5 minuten.</p></div></body></html>' > output/index.html

      - name: Data cache opslaan
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/
          key: lego-data-v2-${{ github.run_id }}

      - name: Dashboard online zetten (GitHub Pages)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'LEGO Dashboard update ${{ github.run_id }}'
